name: CI and Deploy

on:
  push:
    branches: [ staging ]
    tags: ['v*', 'release/*']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_ENV_VARS_VAL: ${{ secrets.RAILWAY_ENV_VARS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if any)
        run: npm test --if-present

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Set Railway environment variables from secret (staging)
        if: ${{ env.RAILWAY_ENV_VARS_VAL != '' && github.ref == 'refs/heads/staging' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
          RAILWAY_ENV_VARS: ${{ secrets.RAILWAY_ENV_VARS }}
        run: |
          echo "Setting Railway environment variables from RAILWAY_ENV_VARS (staging)"
          echo "$RAILWAY_ENV_VARS" | while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            key="${line%%=*}"
            value="${line#*=}"
            echo "Setting $key"
            railway variables set "$key" "$value" || echo "Warning: failed to set $key"
          done

      - name: Set Railway environment variables from secret (production)
        if: ${{ env.RAILWAY_ENV_VARS_VAL != '' && startsWith(github.ref, 'refs/tags/') }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
          RAILWAY_ENV_VARS: ${{ secrets.RAILWAY_ENV_VARS }}
        run: |
          echo "Setting Railway environment variables from RAILWAY_ENV_VARS (production)"
          echo "$RAILWAY_ENV_VARS" | while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            key="${line%%=*}"
            value="${line#*=}"
            echo "Setting $key"
            railway variables set "$key" "$value" || echo "Warning: failed to set $key"
          done

      - name: Deploy to Railway (staging)
        if: ${{ github.ref == 'refs/heads/staging' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway up

      - name: Deploy to Railway (production)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway up
