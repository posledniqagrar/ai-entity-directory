<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Entity Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Segoe UI', 'Inter', sans-serif;
        }
        
        body {
            background-image: url('/images/aero-wallpaper.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        /* Aero Glass login box */
        .aero-login-box {
            background: rgba(18, 25, 45, 0.4);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                0 10px 40px rgba(0, 0, 0, 0.35);
        }

        /* Input styling */
        .aero-input {
            background: rgba(16, 17, 34, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
            transition: all 0.2s ease;
        }
        .aero-input:focus {
            border-color: #8b5cf6 !important;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4) !important;
            outline: none;
        }

        /* Arrow Submit Button */
        .submit-arrow {
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 50%, rgba(0,0,0,0.08) 50.1%, rgba(0,0,0,0.02) 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            box-shadow: 
                0 0 8px rgba(139, 92, 246, 0.3),
                inset 0 1.5px 3px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }
        .submit-arrow:hover {
            transform: scale(1.06);
            box-shadow: 
                0 0 15px rgba(139, 92, 246, 0.7),
                inset 0 1.5px 5px rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center relative">

    <div class="max-w-sm w-full p-8 aero-login-box rounded-2xl flex flex-col items-center">
        <!-- Circle User Profile Frame -->
        <div class="w-20 h-20 rounded-xl bg-purple-600 border border-white/35 flex items-center justify-center text-4xl shadow-lg relative overflow-hidden mb-6">
            <!-- Glass shine overlay -->
            <div class="absolute top-0 left-0 right-0 h-[45%] bg-gradient-to-b from-white/15 to-transparent"></div>
            👤
        </div>

        <h2 class="text-xl font-bold text-white text-center leading-tight mb-1">Welcome</h2>
        <p class="text-white/60 text-xs text-center mb-6">AI Entity System Login</p>

        <form id="login-form" class="w-full space-y-4">
            <div>
                <input type="email" id="email" required placeholder="Email Address" 
                       class="w-full px-3 py-2 rounded-md text-xs aero-input">
            </div>
            <div class="relative flex items-center">
                <input type="password" id="password" required placeholder="Password" 
                       class="w-full pl-3 pr-10 py-2 rounded-md text-xs aero-input">
                <button type="submit" class="submit-arrow w-7 h-7 rounded-full flex items-center justify-center absolute right-1.5 outline-none text-white text-xs">
                    ➔
                </button>
            </div>
        </form>

        <div id="error-message" class="text-red-400 text-xs mt-4 text-center hidden"></div>

        <div class="mt-6 pt-4 border-t border-white/10 w-full flex justify-between items-center text-xs">
            <a href="/" class="text-white/50 hover:text-white transition">Cancel</a>
            <a href="/register" class="text-purple-400 hover:text-purple-300 font-semibold">Create Account</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.error || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
