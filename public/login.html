<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login - AI Entity Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Segoe UI', 'Inter', sans-serif;
        }
        
        body {
            background-image: url('/images/aero-wallpaper.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        /* Aero Glass login box */
        .aero-login-box {
            background: rgba(18, 25, 45, 0.4);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                0 10px 40px rgba(0, 0, 0, 0.35);
        }

        /* Input styling */
        .aero-input {
            background: rgba(16, 17, 34, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
            transition: all 0.2s ease;
        }
        .aero-input:focus {
            border-color: #8b5cf6 !important;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4) !important;
            outline: none;
        }

        /* Arrow Submit Button */
        .submit-arrow {
            background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 50%, rgba(0,0,0,0.08) 50.1%, rgba(0,0,0,0.02) 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            box-shadow: 
                0 0 8px rgba(139, 92, 246, 0.3),
                inset 0 1.5px 3px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
        }
        .submit-arrow:hover {
            transform: scale(1.06);
            box-shadow: 
                0 0 15px rgba(139, 92, 246, 0.7),
                inset 0 1.5px 5px rgba(255, 255, 255, 0.7);
        }
        /* ==========================================================================
           WINDOWS 98 THEME OVERRIDES (LOGIN)
           ========================================================================== */
        body.theme-win98 {
            background-image: none !important;
            background-color: #008080 !important; /* Classic Windows 98 Teal */
            font-family: 'Tahoma', 'Arial', sans-serif !important;
        }
        
        .theme-win98 .aero-login-box {
            background: #c0c0c0 !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border-radius: 0px !important;
            border-top: 2px solid #ffffff !important;
            border-left: 2px solid #ffffff !important;
            border-right: 2px solid #808080 !important;
            border-bottom: 2px solid #808080 !important;
            box-shadow: inset 1px 1px 0px #ffffff, inset -1px -1px 0px #808080, 2px 2px 10px rgba(0,0,0,0.5) !important;
            color: #000000 !important;
        }

        .theme-win98 .aero-login-box h2,
        .theme-win98 .aero-login-box p,
        .theme-win98 .aero-login-box a {
            color: #000000 !important;
            font-family: 'Tahoma', 'Arial', sans-serif !important;
        }

        .theme-win98 .aero-login-box p {
            opacity: 0.7 !important;
        }

        .theme-win98 .aero-input {
            background: #ffffff !important;
            color: #000000 !important;
            border-top: 2px solid #808080 !important;
            border-left: 2px solid #808080 !important;
            border-right: 2px solid #ffffff !important;
            border-bottom: 2px solid #ffffff !important;
            border-radius: 0px !important;
            box-shadow: inset 1px 1px 0px #0a0a0a !important;
            font-family: 'Tahoma', 'Arial', sans-serif !important;
        }

        .theme-win98 .submit-arrow {
            background: #c0c0c0 !important;
            border-top: 2px solid #ffffff !important;
            border-left: 2px solid #ffffff !important;
            border-right: 2px solid #808080 !important;
            border-bottom: 2px solid #808080 !important;
            border-radius: 0px !important;
            color: #000000 !important;
            box-shadow: none !important;
            width: 24px !important;
            height: 20px !important;
            right: 4px !important;
        }

        .theme-win98 .submit-arrow:active {
            border-top: 2px solid #808080 !important;
            border-left: 2px solid #808080 !important;
            border-right: 2px solid #ffffff !important;
            border-bottom: 2px solid #ffffff !important;
        }

        .theme-win98 .w-20.h-20 {
            border-radius: 0px !important;
            border-top: 2px solid #808080 !important;
            border-left: 2px solid #808080 !important;
            border-right: 2px solid #ffffff !important;
            border-bottom: 2px solid #ffffff !important;
            box-shadow: inset 1px 1px 0px #0a0a0a !important;
            background: #e0e0e0 !important;
            color: #000000 !important;
        }
        
        .theme-win98 .w-20.h-20 div {
            display: none !important; /* Hide glass shine overlay */
        }

        /* ==========================================================================
           WINDOWS 11 THEME OVERRIDES (LOGIN)
           ========================================================================== */
        body.theme-win11 {
            background-image: url('/images/win11-wallpaper.png') !important;
            background-size: cover !important;
            font-family: 'Segoe UI Variable', 'Inter', sans-serif !important;
        }

        .theme-win11 .aero-login-box {
            background: rgba(32, 32, 32, 0.75) !important;
            backdrop-filter: blur(35px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(35px) saturate(180%) !important;
            border-radius: 12px !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5) !important;
            color: #ffffff !important;
        }

        .theme-win11 .aero-input {
            border-radius: 6px !important;
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
        }
        
        .theme-win11 .aero-input:focus {
            border-color: #0067c0 !important;
            box-shadow: 0 0 10px rgba(0, 103, 192, 0.4) !important;
        }

        .theme-win11 .submit-arrow {
            border-radius: 6px !important;
            background: #0067c0 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: none !important;
        }
        
        .theme-win11 .submit-arrow:hover {
            transform: scale(1.03) !important;
            background: #0078d4 !important;
        }

        .theme-win11 .w-20.h-20 {
            border-radius: 12px !important;
            background: rgba(255,255,255,0.1) !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
        }
    </style>
</head>
<body class="w-screen h-[100dvh] flex items-center justify-center relative">
    <h1 class="sr-only">AI Entity Account Login</h1>

    <div class="max-w-sm w-full p-8 aero-login-box rounded-2xl flex flex-col items-center">
        <!-- Circle User Profile Frame -->
        <div class="w-20 h-20 rounded-xl bg-purple-600 border border-white/35 flex items-center justify-center text-4xl shadow-lg relative overflow-hidden mb-6">
            <!-- Glass shine overlay -->
            <div class="absolute top-0 left-0 right-0 h-[45%] bg-gradient-to-b from-white/15 to-transparent"></div>
            👤
        </div>

        <h2 class="text-xl font-bold text-white text-center leading-tight mb-1">Welcome</h2>
        <p class="text-white/60 text-xs text-center mb-6">AI Entity System Login</p>

        <form id="login-form" class="w-full space-y-4">
            <div>
                <input type="email" id="email" required placeholder="Email Address" 
                       class="w-full px-3 py-2 rounded-md text-xs aero-input">
            </div>
            <div class="relative flex items-center">
                <input type="password" id="password" required placeholder="Password" 
                       class="w-full pl-3 pr-10 py-2 rounded-md text-xs aero-input">
                <button type="submit" class="submit-arrow w-7 h-7 rounded-full flex items-center justify-center absolute right-1.5 outline-none text-white text-xs">
                    ➔
                </button>
            </div>
        </form>

        <div id="error-message" class="text-red-400 text-xs mt-4 text-center hidden"></div>

        <div class="mt-6 pt-4 border-t border-white/10 w-full flex justify-between items-center text-xs">
            <a href="/" class="text-white/50 hover:text-white transition">Cancel</a>
            <a href="/register" class="text-purple-400 hover:text-purple-300 font-semibold">Create Account</a>
        </div>
    </div>

    <script>
        // Apply saved theme preference
        const savedTheme = localStorage.getItem('selected-theme') || 'win7';
        if (savedTheme === 'win98') {
            document.body.classList.add('theme-win98');
        } else if (savedTheme === 'win11') {
            document.body.classList.add('theme-win11');
        } else {
            document.body.classList.add('theme-win7');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.error || 'Invalid credentials';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
