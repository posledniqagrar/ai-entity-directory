<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AI Services Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">AI Directory</a>
                <a href="/" class="text-gray-600 hover:text-gray-900">← Back to Directory</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div id="profile-content"></div>
    </div>

    <script>
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me', { credentials: 'include' });
                if (!response.ok) {
                    window.location.href = '/login';
                    return;
                }
                const data = await response.json();
                loadFavorites(data.user);
            } catch (error) {
                window.location.href = '/login';
            }
        }

        async function loadFavorites(user) {
            try {
                const response = await fetch('/api/favorites', { credentials: 'include' });
                const favorites = await response.json();
                
                const content = document.getElementById('profile-content');
                content.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                        <h2 class="text-2xl font-bold mb-4">Welcome, ${user.email}</h2>
                        <p class="text-gray-600">Role: ${user.role}</p>
                        <button onclick="logout()" class="mt-4 text-red-600 hover:text-red-700">Logout</button>
                    </div>
                    <div class="bg-white rounded-lg shadow-md p-6">
                        <h3 class="text-xl font-semibold mb-4">Your Favorites (${favorites.length})</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${favorites.map(service => `
                                <div class="border rounded-lg p-4 hover:shadow-lg transition">
                                    <h4 class="font-semibold text-lg">${service.name}</h4>
                                    <p class="text-gray-600 text-sm mt-2">${service.description}</p>
                                    <div class="flex justify-between items-center mt-3">
                                        <span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded-full">${service.category}</span>
                                        <a href="${service.url}" target="_blank" class="text-blue-600 hover:text-blue-700 text-sm">Visit →</a>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-gray-500">No favorites yet. Browse the directory and save your favorite AI tools!</p>'}
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load favorites:', error);
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/';
        }

        checkAuth();
    </script>
</body>
</html>
