<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - AI Entity Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Segoe UI', 'Inter', sans-serif;
        }
        
        body {
            background-color: #0f1026;
            overflow-x: hidden;
            min-height: 100vh;
            min-height: 100dvh;
        }
        
        /* Desktop Wallpaper Style */
        .desktop-env {
            background-image: url('/images/aero-wallpaper.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* Aero Glass Effect */
        .aero-glass {
            background: rgba(18, 25, 45, 0.45);
            backdrop-filter: blur(25px) saturate(170%);
            -webkit-backdrop-filter: blur(25px) saturate(170%);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.35),
                inset 0 -1px 0 rgba(0, 0, 0, 0.15),
                0 10px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }
        
        /* Glass reflection gloss strip */
        .aero-glass::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.05) 50%, transparent 50.1%);
            pointer-events: none;
            z-index: 1;
        }

        /* Aero active glossy buttons */
        .aero-btn {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.04) 50%, rgba(0, 0, 0, 0.08) 50.1%, rgba(0, 0, 0, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.35),
                0 2px 4px rgba(0, 0, 0, 0.15);
            color: #ffffff;
            transition: all 0.2s ease;
        }
        
        .aero-btn:hover {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.08) 50%, rgba(0, 0, 0, 0.04) 50.1%, rgba(255, 255, 255, 0.06) 100%);
            border-color: rgba(139, 92, 246, 0.45);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.35),
                0 0 10px rgba(139, 92, 246, 0.5);
        }

        /* Classic Blue Aero Active Button */
        .aero-btn-blue {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.55) 0%, rgba(37, 99, 235, 0.35) 50%, rgba(29, 78, 216, 0.45) 50.1%, rgba(30, 58, 138, 0.5) 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
        }
        .aero-btn-blue:hover {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.7) 0%, rgba(37, 99, 235, 0.5) 50%, rgba(29, 78, 216, 0.6) 50.1%, rgba(30, 58, 138, 0.7) 100%);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
        }

        /* Window controls minimize, maximize, close */
        .win-btn {
            width: 28px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            font-size: 10px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.85);
            transition: all 0.15s ease;
        }
        .win-btn-close:hover {
            background-color: #e81123 !important;
            color: white !important;
        }
        .win-btn-action:hover {
            background-color: rgba(255, 255, 255, 0.15) !important;
            color: white !important;
        }

        /* Start Orb Button */
        .start-orb {
            background: radial-gradient(circle, rgba(139,92,246,0.6) 0%, rgba(59,130,246,0.2) 65%, transparent 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: 
                0 0 12px rgba(139, 92, 246, 0.4),
                inset 0 1.5px 4px rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="w-screen min-h-[100dvh] overflow-x-hidden">
    <h1 class="sr-only">AI Entity User Profile & Favorites</h1>

    <!-- Desktop Environment Background wrapper -->
    <div class="desktop-env min-h-[100dvh] flex flex-col justify-between">

        <!-- Navigation Bar -->
        <nav class="bg-black/35 backdrop-blur-md border-b border-white/15 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-14">
                    <div class="flex items-center space-x-3">
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center overflow-hidden bg-transparent">
                            <img src="/images/aie-logo.png?v=8" alt="AI Entity logo" class="w-full h-full object-cover" />
                        </div>
                        <div>
                            <a href="/" class="text-lg font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
                                AI Entity
                            </a>
                            <p class="text-[10px] text-purple-300/60 leading-tight">Premium AI Directory</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="/" class="aero-btn px-4 py-1.5 rounded text-xs font-semibold">← Desktop Directory</a>
                        <button onclick="logout()" class="aero-btn bg-red-600/35 border-red-500/30 px-4 py-1.5 rounded text-xs font-semibold hover:bg-red-600/45">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Window Container -->
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
            <div id="profile-window" class="aero-glass rounded-xl border border-white/25 flex flex-col overflow-hidden w-full">
                <!-- Window Header (Title Bar) -->
                <div class="h-9 border-b border-white/10 flex items-center justify-between px-4 select-none relative z-10">
                    <div class="flex items-center space-x-2">
                        <span>👤</span>
                        <span class="text-xs font-semibold text-white/90">User Account Properties</span>
                    </div>
                    <!-- Window Controls -->
                    <div class="flex items-center space-x-1.5">
                        <button onclick="window.location.href='/'" class="win-btn win-btn-action bg-white/5">—</button>
                        <button onclick="window.location.href='/'" class="win-btn win-btn-close bg-white/5 text-lg">×</button>
                    </div>
                </div>

                <!-- Window Content body -->
                <div id="profile-content" class="p-6 bg-[#16172d]/85 text-white select-text space-y-6">
                    <!-- Dynamic content injected here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-t border-white/10 py-6 bg-black/25 text-center text-xs text-white/40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-center space-x-2 items-center mb-2">
                <img src="/images/aie-logo.png?v=8" alt="AI Entity logo" class="w-6 h-6 object-contain" />
                <span class="font-medium text-white/60">AI Entity System</span>
            </div>
            <p>© 2026 AI Entity. All rights reserved.</p>
        </footer>

    </div>

    <script>
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me', { credentials: 'include' });
                if (!response.ok) {
                    window.location.href = '/login';
                    return;
                }
                const data = await response.json();
                loadFavorites(data.user);
            } catch (error) {
                window.location.href = '/login';
            }
        }

        async function loadFavorites(user) {
            try {
                const response = await fetch('/api/favorites', { credentials: 'include' });
                const favorites = await response.json();
                
                const content = document.getElementById('profile-content');
                content.innerHTML = `
                    <div class="bg-[#1b1c35]/50 border border-white/10 rounded-xl p-6 relative overflow-hidden select-none">
                        <div class="absolute top-0 left-0 right-0 h-[40%] bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
                        <div class="flex justify-between items-start flex-wrap gap-4 relative z-10">
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 rounded-lg bg-purple-600 flex items-center justify-center text-xl font-bold border border-white/20">
                                    👤
                                </div>
                                <div>
                                    <h2 class="text-2xl font-bold text-white tracking-wide">
                                        Welcome, ${user.email.split('@')[0]}
                                    </h2>
                                    <p class="text-white/60 text-xs mt-1">
                                        Email: <span class="text-white/80 select-all font-mono">${user.email}</span> | 
                                        System Role: <span class="capitalize font-semibold text-purple-300">${user.role}</span>
                                    </p>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                ${user.role === 'admin' ? '<a href="/admin" class="aero-btn px-4 py-2 rounded text-xs font-semibold border-blue-500/30 text-blue-300">Control Panel (Admin)</a>' : ''}
                                <a href="/submit" class="aero-btn aero-btn-blue text-white px-4 py-2 rounded text-xs font-semibold shadow">+ Submit AI</a>
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <h3 class="text-lg font-bold mb-4 text-white/90 border-b border-white/10 pb-1.5 select-none">
                            Bookmarked Favorites Folder (${favorites.length})
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            ${favorites.map(service => {
                                const maxLen = 110;
                                const isLong = service.description.length > maxLen;
                                const displayDesc = isLong ? service.description.substring(0, maxLen) + '...' : service.description;

                                return `
                                <div class="bg-[#1b1c35]/55 border border-white/10 rounded-lg p-5 shadow flex flex-col justify-between relative overflow-hidden group select-none">
                                    <div class="absolute top-0 left-0 right-0 h-[40%] bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
                                    
                                    <div class="relative z-10">
                                        <div class="flex items-center space-x-3 mb-2.5">
                                            <img src="${service.logo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(service.name)}&background=8b5cf6&color=fff`}" 
                                                 alt="${service.name}" class="w-10 h-10 rounded-md border border-white/10">
                                            <h4 class="font-semibold text-sm text-white tracking-wide">${service.name}</h4>
                                        </div>
                                        <p class="text-white/60 text-[11px] leading-normal select-text">${displayDesc}</p>
                                    </div>
                                    <div class="flex justify-between items-center mt-4 border-t border-white/5 pt-2.5 relative z-10">
                                        <span style="font-size: 9px;" class="px-2 py-0.5 bg-purple-500/10 text-purple-300 rounded border border-purple-500/20 font-semibold">${service.category}</span>
                                        <a href="${service.url}" target="_blank" rel="noopener noreferrer" 
                                           class="text-purple-400 hover:text-purple-300 text-xs font-semibold transition">Open →</a>
                                    </div>
                                </div>
                            `}).join('') || '<p class="text-white/40 text-xs font-medium py-6 col-span-full select-none">No favorites bookmarked yet. Double-click "Computer" to browse and star AI services.</p>'}
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load favorites:', error);
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/';
        }

        checkAuth();
    </script>
</body>
</html>
