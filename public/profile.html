<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AI Entity Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 24px rgba(139, 92, 246, 0.15);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen text-white">
    <!-- Navigation -->
    <nav class="bg-black/30 backdrop-blur-md border-b border-purple-500/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <!-- Company Logo -->
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center overflow-hidden bg-transparent">
                        <img src="/images/aie-logo.png?v=3" alt="AI Entity logo" class="w-full h-full object-cover" />
                    </div>
                    <div>
                        <a href="/" class="text-xl font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
                            AI Entity
                        </a>
                        <p class="text-xs text-purple-300/60">Premium AI Directory</p>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-purple-300 hover:text-purple-200 transition text-sm font-medium">← Back to Directory</a>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300 transition text-sm font-medium">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div id="profile-content" class="space-y-8"></div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-purple-500/20 mt-20 py-8 bg-black/20 text-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center space-x-2 items-center mb-4">
                <div class="w-6 h-6 rounded flex items-center justify-center overflow-hidden bg-transparent">
                    <img src="/images/aie-logo.png?v=3" alt="AI Entity logo" class="w-full h-full object-cover" />
                </div>
                <span class="text-purple-300 font-medium text-sm">AI Entity Directory</span>
            </div>
            <p class="text-gray-500 text-sm">© 2026 AI Entity. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me', { credentials: 'include' });
                if (!response.ok) {
                    window.location.href = '/login';
                    return;
                }
                const data = await response.json();
                loadFavorites(data.user);
            } catch (error) {
                window.location.href = '/login';
            }
        }

        async function loadFavorites(user) {
            try {
                const response = await fetch('/api/favorites', { credentials: 'include' });
                const favorites = await response.json();
                
                const content = document.getElementById('profile-content');
                content.innerHTML = `
                    <div class="bg-gray-900/50 backdrop-blur-sm rounded-2xl border border-purple-500/20 p-8 shadow-xl">
                        <div class="flex justify-between items-start flex-wrap gap-4">
                            <div>
                                <h2 class="text-3xl font-bold bg-gradient-to-r from-purple-400 via-blue-400 to-purple-400 bg-clip-text text-transparent">
                                    Welcome, ${user.email.split('@')[0]}
                                </h2>
                                <p class="text-purple-300/70 mt-1">Email: ${user.email} | Role: <span class="capitalize font-semibold text-purple-300">${user.role}</span></p>
                            </div>
                            <div class="flex gap-3">
                                ${user.role === 'admin' ? '<a href="/admin" class="bg-blue-600/30 border border-blue-500/30 text-blue-300 px-4 py-2 rounded-xl hover:bg-blue-600/40 transition text-sm font-semibold">Admin Panel</a>' : ''}
                                <a href="/submit" class="gradient-bg text-white px-4 py-2 rounded-xl hover:opacity-90 transition text-sm font-semibold shadow-lg shadow-purple-500/10">+ Submit AI</a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-gray-900/50 backdrop-blur-sm rounded-2xl border border-purple-500/20 p-8 shadow-xl">
                        <h3 class="text-2xl font-bold mb-6 bg-gradient-to-r from-purple-400 via-blue-400 to-purple-400 bg-clip-text text-transparent">
                            Your Favorites (${favorites.length})
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${favorites.map(service => `
                                <div class="bg-black/20 border border-purple-500/10 rounded-xl p-6 card-hover transition-all flex flex-col justify-between">
                                    <div>
                                        <div class="flex items-center space-x-3 mb-3">
                                            <img src="${service.logo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(service.name)}&background=8b5cf6&color=fff`}" 
                                                 alt="${service.name}" class="w-10 h-10 rounded-lg">
                                            <h4 class="font-semibold text-lg text-white">${service.name}</h4>
                                        </div>
                                        <p class="text-purple-200/60 text-sm mt-2 leading-relaxed">${service.description.length > 120 ? service.description.substring(0, 120) + '...' : service.description}</p>
                                    </div>
                                    <div class="flex justify-between items-center mt-5">
                                        <span class="px-2.5 py-1 bg-purple-500/20 text-purple-300 text-xs rounded-full border border-purple-500/30 font-medium">${service.category}</span>
                                        <a href="${service.url}" target="_blank" rel="noopener noreferrer" 
                                           class="text-purple-400 hover:text-purple-300 text-sm font-medium transition">Visit →</a>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-purple-300/50 col-span-full">No favorites bookmarked yet. Browse the directory and click the star icon to save your favorite AI tools.</p>'}
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load favorites:', error);
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/';
        }

        checkAuth();
    </script>
</body>
</html>
