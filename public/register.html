<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Entity Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
        }
        input {
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #e5e5e5;
        }
        input#email,
        input#password {
            background: #ffffff;
            border-color: #d1d5db;
            color: #111827;
        }
        input#email::placeholder,
        input#password::placeholder {
            color: #6b7280;
        }
        input:focus {
            border-color: #e5e5e5;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-gray-900/50 backdrop-blur-sm p-8 rounded-2xl border border-purple-500/20">
        <div class="text-center">
            <div class="flex justify-center mb-4">
                <div class="gradient-bg w-16 h-16 rounded-xl flex items-center justify-center">
                    <span class="text-white font-bold text-2xl">AIE</span>
                </div>
            </div>
            <h2 class="text-3xl font-bold text-white">Create Account</h2>
            <p class="mt-2 text-gray-400">Join the AI Entity community</p>
        </div>
        <form id="register-form" class="mt-8 space-y-6">
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-medium text-gray-300">Email address</label>
                    <input type="email" id="email" required class="mt-1 w-full px-3 py-2 rounded-lg">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-300">Password (min 6 characters)</label>
                    <input type="password" id="password" required class="mt-1 w-full px-3 py-2 rounded-lg">
                </div>
            </div>
            <button type="submit" class="gradient-bg w-full py-3 rounded-lg text-white font-medium hover:opacity-90 transition">
                Register
            </button>
        </form>
        <div id="error-message" class="text-red-400 text-sm text-center hidden"></div>
        <p class="text-center text-sm text-gray-400">
            Already have an account? <a href="/login" class="text-purple-400 hover:text-purple-300">Sign in</a>
        </p>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
